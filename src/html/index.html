<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaulty - Partage sécurisé de secrets</title>
    <link rel="icon" type="image/png" href="/assets/vaulty.png">
    <link rel="stylesheet" href="/assets/style.css" nonce="{{nonce}}">
    <script src="/assets/qrcode.min.js" nonce="{{nonce}}"></script>
</head>

<body class="shorty">
    <div class="shorty__container">
        <div class="card">
            <header class="card__header">
                <img src="/assets/vaulty.png" alt="Logo de Vaulty" class="card__logo">
                <h1 class="card__title">Vaulty</h1>
                <p class="card__subtitle">Partagez un secret ou mot de passe chiffré de façon sécurisée à vue unique</p>
            </header>

            <form id="shorten-form" class="form" autocomplete="off" novalidate>
                <div class="form__group">
                    <label class="form__label" for="url-input">Secret ou mot de passe à partager</label>
                    <div class="form__input-wrapper">
                        <textarea id="url-input" class="form__input secret-input__textarea" placeholder="Saisissez votre secret confidentiel ou mot de passe ici..." required></textarea>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="form__submit-btn">
                    <span id="btn-spinner" class="form__spinner"></span>
                    <span id="btn-text" class="form__btn-text">Générer le lien sécurisé</span>
                </button>
            </form>

            <div id="error-message" class="alert"></div>

            <div id="result-section" class="result">
                <div class="result__label">Lien de partage (vue unique)</div>
                <div class="result__box">
                    <span id="result-url" class="result__url"></span>
                    <button id="copy-btn" class="result__copy-btn">Copier</button>
                </div>

                <div class="qr-code">
                    <div class="qr-code__label">Scanner le QR code</div>
                    <div id="qrcode" class="qr-code__display"></div>
                    <a id="download-qr-btn" class="qr-code__download-btn u-hidden" href="#" download="qrcode.png">Télécharger le QR code</a>
                </div>
            </div>
        </div>

        <footer class="shorty__footer">
            Vaulty &copy; 2026
        </footer>
    </div>

    <script src="/assets/app.js" nonce="{{nonce}}"></script>
</body>

</html>
