<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorty</title>
    <style nonce="{{nonce}}">
        /* CSS resets and variables */
        :root {
            --bg-gradient: radial-gradient(circle at top, #1e1b4b 0%, #0f172a 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --accent-glow: rgba(99, 102, 241, 0.15);
            --success-color: #10b981;
            --success-glow: rgba(16, 185, 129, 0.2);
            --error-color: #ef4444;
            --error-glow: rgba(239, 68, 68, 0.2);
            --input-bg: rgba(15, 23, 42, 0.6);
            --input-border: #334155;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-stack);
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
            perspective: 1000px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6),
                0 0 50px var(--accent-glow),
                inset 0 1px 1px rgba(255, 255, 255, 0.08);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, #a5b4fc 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="url"] {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 0.95rem;
            font-family: inherit;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 0.75rem;
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input[type="url"]::placeholder {
            color: #4b5563;
        }

        input[type="url"]:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* Input Validation Styles */
        input[type="url"].valid {
            border-color: var(--success-color);
            box-shadow: 0 0 0 3px var(--success-glow);
        }

        input[type="url"].invalid:not(:placeholder-shown) {
            border-color: var(--error-color);
            box-shadow: 0 0 0 3px var(--error-glow);
        }

        .submit-btn {
            width: 100%;
            padding: 0.875rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            color: #ffffff;
            background: var(--accent-gradient);
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .submit-btn:hover:not(:disabled) {
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3), 0 4px 6px -2px rgba(99, 102, 241, 0.15);
            filter: brightness(1.1);
        }

        .submit-btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Spinner for loading state */
        .spinner {
            display: none;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-message {
            display: none;
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            animation: fadeIn 0.3s ease-out;
        }

        .result-section {
            display: none;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .result-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .result-box {
            display: flex;
            align-items: center;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--input-border);
            border-radius: 0.75rem;
            padding: 0.5rem;
            gap: 0.5rem;
        }

        .result-url {
            flex-grow: 1;
            padding-left: 0.5rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.9rem;
            color: #38bdf8;
            word-break: break-all;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .copy-btn {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            font-family: inherit;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .copy-btn.copied {
            background: var(--success-color);
            color: #ffffff;
            border-color: var(--success-color);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #4b5563;
            text-align: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* QR Code Section */
        .qr-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            gap: 0.85rem;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.02);
            animation: fadeIn 0.4s ease-out;
        }

        .qr-code {
            padding: 0.75rem;
            background: #ffffff;
            border-radius: 0.75rem;
            display: inline-block;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .qr-code:hover {
            transform: scale(1.02);
        }

        .qr-code canvas,
        .qr-code img {
            display: block;
            width: 140px !important;
            height: 140px !important;
        }

        .qr-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .download-qr-btn {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            padding: 0.4rem 0.8rem;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" nonce="{{nonce}}"></script>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Shorty</h1>
                <p class="subtitle">Enter a long link to generate an optimized short URL</p>
            </div>

            <form id="shorten-form" autocomplete="off" novalidate>
                <div class="form-group">
                    <label for="url-input">Destination URL</label>
                    <div class="input-wrapper">
                        <input type="url" id="url-input" placeholder="https://example.com/very-long-path" required>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="submit-btn">
                    <span id="btn-spinner" class="spinner"></span>
                    <span id="btn-text">Shorten URL</span>
                </button>
            </form>

            <div id="error-message" class="error-message"></div>

            <div id="result-section" class="result-section">
                <div class="result-label">Shortened URL</div>
                <div class="result-box">
                    <span id="result-url" class="result-url"></span>
                    <button id="copy-btn" class="copy-btn">Copy</button>
                </div>

                <div class="qr-container">
                    <div class="qr-label">Scan QR Code</div>
                    <div id="qrcode" class="qr-code"></div>
                    <a id="download-qr-btn" class="copy-btn download-qr-btn" href="#" download="qrcode.png"
                        style="display: none;">Download QR</a>
                </div>
            </div>
        </div>

        <div class="footer">
            Shorty &copy; 2026
        </div>
    </div>

    <script nonce="{{nonce}}">
        (function () {
            const form = document.getElementById('shorten-form');
            const urlInput = document.getElementById('url-input');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const errorMsg = document.getElementById('error-message');
            const resultSection = document.getElementById('result-section');
            const resultUrl = document.getElementById('result-url');
            const copyBtn = document.getElementById('copy-btn');
            const qrcodeContainer = document.getElementById('qrcode');
            const downloadQrBtn = document.getElementById('download-qr-btn');
            let qrcodeInstance = null;

            // Dynamic UI validation styles
            urlInput.addEventListener('input', () => {
                const value = urlInput.value.trim();
                if (value === '') {
                    urlInput.classList.remove('valid', 'invalid');
                    return;
                }

                try {
                    const parsed = new URL(value);
                    if (parsed.protocol === 'http:' || parsed.protocol === 'https:') {
                        urlInput.classList.remove('invalid');
                        urlInput.classList.add('valid');
                    } else {
                        urlInput.classList.remove('valid');
                        urlInput.classList.add('invalid');
                    }
                } catch (_) {
                    urlInput.classList.remove('valid');
                    urlInput.classList.add('invalid');
                }
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const urlValue = urlInput.value.trim();
                if (!urlValue) {
                    showError('Please enter a URL.');
                    return;
                }

                // Client-side quick protocol validation
                try {
                    const parsed = new URL(urlValue);
                    if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') {
                        showError('Only http and https protocols are supported.');
                        return;
                    }
                } catch (_) {
                    showError('Please enter a valid absolute URL (e.g., https://example.com).');
                    return;
                }

                // Reset status indicators
                hideError();
                resultSection.style.display = 'none';

                // Loading states
                submitBtn.disabled = true;
                btnSpinner.style.display = 'inline-block';
                btnText.textContent = 'Generating...';

                try {
                    const response = await fetch('/api/shorty', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ url: urlValue })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.message || 'Error occurred while generating shortened link.');
                    }

                    // Display shortened URL
                    resultUrl.textContent = data.shortUrl;

                    // Generate QR Code
                    if (!qrcodeInstance) {
                        qrcodeInstance = new QRCode(qrcodeContainer, {
                            text: data.shortUrl,
                            width: 256,
                            height: 256,
                            colorDark: "#0f172a",
                            colorLight: "#ffffff",
                            correctLevel: QRCode.CorrectLevel.M
                        });
                    } else {
                        qrcodeInstance.clear();
                        qrcodeInstance.makeCode(data.shortUrl);
                    }

                    // Setup QR Code download link (extract data URI from generated canvas/img)
                    setTimeout(() => {
                        const canvas = qrcodeContainer.querySelector('canvas');
                        const img = qrcodeContainer.querySelector('img');
                        let qrDataUrl = '';

                        if (canvas) {
                            qrDataUrl = canvas.toDataURL('image/png');
                        } else if (img && img.src) {
                            qrDataUrl = img.src;
                        }

                        if (qrDataUrl) {
                            downloadQrBtn.href = qrDataUrl;
                            downloadQrBtn.style.display = 'inline-flex';
                        } else {
                            downloadQrBtn.style.display = 'none';
                        }
                    }, 100);

                    resultSection.style.display = 'block';
                    resultSection.scrollIntoView({ behavior: 'smooth' });

                } catch (err) {
                    showError(err.message);
                } finally {
                    submitBtn.disabled = false;
                    btnSpinner.style.display = 'none';
                    btnText.textContent = 'Shorten URL';
                }
            });

            copyBtn.addEventListener('click', async () => {
                const targetText = resultUrl.textContent;
                if (!targetText) return;

                try {
                    await navigator.clipboard.writeText(targetText);
                    copyBtn.textContent = 'Copied!';
                    copyBtn.classList.add('copied');

                    setTimeout(() => {
                        copyBtn.textContent = 'Copy';
                        copyBtn.classList.remove('copied');
                    }, 2000);
                } catch (err) {
                    console.error('Could not copy link to clipboard:', err);
                }
            });

            function showError(message) {
                errorMsg.textContent = message;
                errorMsg.style.display = 'block';
            }

            function hideError() {
                errorMsg.style.display = 'none';
                errorMsg.textContent = '';
            }
        })();
    </script>
</body>

</html>
