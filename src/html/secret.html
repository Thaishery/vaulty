<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaulty - Consultation du secret</title>
    <link rel="icon" type="image/png" href="/assets/vaulty.png">
    <link rel="stylesheet" href="/assets/style.css" nonce="{{nonce}}">
</head>

<body class="shorty">
    <div class="shorty__container">
        <div class="card">
            <header class="card__header">
                <img src="/assets/vaulty.png" alt="Logo de Vaulty" class="card__logo">
                <h1 class="card__title">Vaulty</h1>
                <p id="secret-title" class="card__subtitle">{{title}}</p>
            </header>

            <div class="card__content">
                <div class="alert {{status_class}}">
                    {{message}}
                </div>

                <div id="secret-box" class="result {{secret_display_class}}">
                    <div class="result__label">Secret partagé</div>
                    <div class="result__box">
                        <textarea id="secret-content" class="form__input secret-display__textarea" readonly>{{secret_content}}</textarea>
                        <button id="copy-secret-btn" class="result__copy-btn secret-display__copy-btn">Copier</button>
                    </div>
                </div>
                
                <div class="card__actions">
                    <a href="/" class="form__submit-btn card__action-btn">Créer un nouveau secret</a>
                </div>
            </div>
        </div>

        <footer class="shorty__footer">
            Vaulty &copy; 2026
        </footer>
    </div>

    <script nonce="{{nonce}}">
        (function() {
            const copyBtn = document.getElementById('copy-secret-btn');
            const secretContent = document.getElementById('secret-content');

            if (copyBtn && secretContent) {
                copyBtn.addEventListener('click', async () => {
                    const textToCopy = secretContent.value;
                    if (!textToCopy) return;

                    try {
                        await navigator.clipboard.writeText(textToCopy);
                        copyBtn.textContent = 'Copié !';
                        copyBtn.classList.add('result__copy-btn--copied');

                        setTimeout(() => {
                            copyBtn.textContent = 'Copier';
                            copyBtn.classList.remove('result__copy-btn--copied');
                        }, 2000);
                    } catch (err) {
                        console.error('Failed to copy secret:', err);
                    }
                });
            }
        })();
    </script>
</body>

</html>
